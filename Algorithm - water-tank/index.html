<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Tank Problem</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Water Tank Problem</h1>
        <!-- LeetCode 42: Trapping Rain Water is used as the reference for this problem. Same algorithm can be used here.-->
      </header>

      <div class="input-section">
        <label for="heights-input">Enter Heights (comma-separated):</label>
        <input
          type="text"
          id="heights-input"
          placeholder="0,1,0,2,1,0,1,3,2,1,2,1"
          value="0,4,0,0,0,6,0,6,4,0"
        />
        <button id="calculate-btn">Calculate Water Trapped</button>
      </div>

      <div class="result-section">
        <div class="result-display">
          <h3>Result: <span id="water-result">0</span> Units</h3>
        </div>
      </div>

      <div class="visualization-section">
        <h3>Visual Representation</h3>
        <div id="svg-container">
          <svg id="water-tank-svg" viewBox="0 0 800 400"></svg>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
